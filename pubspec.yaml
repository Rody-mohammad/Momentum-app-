name: momentum
description: A professional habit tracker application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  confetti: ^0.8.0
  cupertino_icons: ^1.0.6
  fl_chart: ^0.68.0
  go_router: ^17.0.0
  google_fonts: ^6.2.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Utils
  intl: ^0.20.2
  provider: ^6.1.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation & Linting
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  very_good_analysis: ^5.1.0

flutter:
  uses-material-design: true